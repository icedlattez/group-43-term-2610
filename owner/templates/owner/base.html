{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Panel</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            line-height: 1.6;
        }

        /* NAVBAR */
        .navbar {
            background: #2c3e50;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            background: #34495e;
            border-radius: 6px;
            transition: 0.2s;
            font-size: 14px;
        }

        .navbar a:hover {
            background: #1abc9c;
            transform: translateY(-1px);
        }

        /* SPECIAL BUTTON */
        .navbar .add-btn {
            background: #2ecc71;
            font-weight: bold;
        }

        .navbar .add-btn:hover {
            background: #27ae60;
        }

        /* PAGE CONTAINER */
        .container {
            padding: 25px;
        }

        /* CARD */
        .card {
            background: white;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            padding: 8px 14px;
            background: #3498db;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #2980b9;
        }

        .btn-success {
            background: #2ecc71;
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        /* FORM */
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        label {
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'owner_list' %}">Owner</a>
    <a href="{% url 'stall_list' %}">Stalls</a>
    <a href="{% url 'dashboard' %}">Dashboard</a>

    <!-- CLEAN ADD BUTTON -->
    <a href="{% url 'stall_create' %}" class="add-btn">
        + Add Stall
    </a>

</div>

<!-- CONTENT -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
