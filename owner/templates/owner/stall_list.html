{% extends "owner/base.html" %}

{% block content %}

{% for s in stalls %}
<div class="card">

    <h2>{{ s.name }}</h2>

    <p><b>Owner:</b> {{ s.owner.name }}</p>
    <p><b>Phone:</b> {{ s.owner.phone }}</p>

    <p><b>Description:</b> {{ s.description }}</p>
    <p><b>Location:</b> {{ s.location }}</p>

    <a href="{% url 'stall_detail' s.id %}" class="btn">View Stall</a>

</div>
{% empty %}
<p>No stalls found.</p>
{% endfor %}

{% endblock %}
