<h1 class="title mb-4">My Owner Dashboard</h1>

<div class="row">

    {% for reg in owner_regs %}
        <div class="col-md-6 mb-4">

            <div class="card h-100">

                <div class="card-body">

                    <h5 class="card-title">
                        {{ reg.event.name }}
                    </h5>

                    <p class="text-muted mb-2">
                        📍 {{ reg.event.location }}
                    </p>

                    {% if reg.event.description %}
                        <p>{{ reg.event.description }}</p>
                    {% endif %}

                    <hr>

                    <a href="{% url 'event_detail' reg.event.id %}" class="btn btn-sm btn-outline-secondary">
                        View Event
                    </a>

                </div>

            </div>

        </div>

    {% empty %}
        <div class="col-12">
            <div class="card p-4 text-center">
                <p class="mb-3">No event registrations yet.</p>
                <a href="{% url 'home' %}" class="btn btn-primary">
                    Browse Events
                </a>
            </div>
        </div>
    {% endfor %}

</div>
