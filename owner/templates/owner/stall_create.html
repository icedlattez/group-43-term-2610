{% extends 'owner/base.html' %}

{% block title %}Create Stall{% endblock %}

{% block content %}

<div class="card" style="max-width:500px; margin:auto; padding:20px;">

    <h2>Create Stall</h2>

    <div style="margin-bottom:15px;">
        <strong>Owner:</strong> {{ owner.name }}
    </div>

    <form method="POST">
        {% csrf_token %}

        <!-- STALL NAME -->
        <label>Stall Name</label><br>
        <input type="text" name="name" required style="width:100%;"><br><br>

        <!-- EVENT -->
        <label>Event</label><br>
        <select name="event_id" style="width:100%;">
            <option value="">No Event (Rental Stall)</option>
            {% for event in events %}
                <option value="{{ event.id }}">{{ event.title }}</option>
            {% endfor %}
        </select><br><br>

        <!-- LOCATION -->
        <label>Location</label><br>
        <input type="text" name="location" required style="width:100%;"><br><br>

        <!-- DESCRIPTION -->
        <label>Description</label><br>
        <textarea name="description" style="width:100%;"></textarea><br><br>

        <!-- CAPACITY -->
        <label>Capacity</label><br>
        <input type="number" name="capacity" value="1" style="width:100%;"><br><br>

        <!-- RENTAL FEE -->
        <label>Rental Fee (RM)</label><br>
        <input type="number" step="0.01" name="rental_fee" value="0" style="width:100%;"><br><br>

        <button type="submit" style="width:100%;">Create Stall</button>

    </form>

</div>

{% endblock %}
