{% extends "products/base.html" %}
{% load static %}

{% block content %}

<div class="container mt-4">

    <h2>Create Product</h2>

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
            <label>Stall</label>
            <select name="stall" class="form-control" required>
                <option value="">-- Select Stall --</option>

                {% for stall in stalls %}
                    <option value="{{ stall.id }}"
                        {% if stall.id|stringformat:"s" == preselected_stall_id %}
                            selected
                        {% endif %}
                    >
                        {{ stall.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Product Image</label>
            <input type="file"
                   name="product_image"
                   class="form-control"
                   accept="image/*">
        </div>

        <div class="mb-3">
            <label>Name</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea name="description"
                      class="form-control"></textarea>
        </div>

      <div class="mb-3">
    <label>Price</label>
    <input type="number"
           name="price"
           class="form-control"
           min="0"
           step="0.01"
           required>
</div>

        <div class="mb-3">
            <label>Stock Quantity</label>
            <input type="number"
                   name="stock_quantity"
                   class="form-control"
                   value="0"
                   min="0"
                   required>
        </div>

        <button type="submit" class="btn btn-primary">
            Create
        </button>

        <a href="{% url 'stall_list' %}" class="btn btn-secondary">
            Back to Stalls
        </a>

    </form>

</div>

{% endblock %}
