{% extends "base.html" %}

{% block content %}

<h2>Product List</h2>

{% for p in products %}
<div class="card">

    <h3>{{ p.name }}</h3>

    <p><b>Price:</b> {{ p.price }}</p>

    <p><b>Description:</b> {{ p.description }}</p>

    <p><b>Stall:</b> {{ p.stall.name }}</p>

    <a href="{% url 'product_detail' p.id %}" class="btn">View Product</a>

</div>
{% empty %}
<p>No products found.</p>
{% endfor %}

{% endblock %}
