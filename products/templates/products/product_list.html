{% extends "products/base.html" %}

{% block content %}

<h2>Product List</h2>

<a href="{% url 'product_create' %}">+ Add Product</a>

{% for p in products %}
<div class="card">

    <h3>{{ p.name }}</h3>

    <p><b>Price:</b> RM {{ p.price }}</p>

    <p>{{ p.description }}</p>

    <p><b>Stall:</b> {{ p.stall.name }}</p>

    <a href="{% url 'product_detail' p.id %}">View</a>

</div>
{% empty %}
<p>No products found.</p>
{% endfor %}

{% endblock %}
