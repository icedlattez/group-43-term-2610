{% extends "base.html" %}

{% block content %}

<h2>Products for {{ stall.name }}</h2>

<a href="{% url 'product_list' %}">← Back</a>

{% for p in products %}
<div class="card">

    <h3>{{ p.name }}</h3>

    <p>RM {{ p.price }}</p>

    <p>{{ p.description }}</p>

    <a href="{% url 'product_detail' p.id %}">View</a>

</div>
{% empty %}
<p>No products in this stall.</p>
{% endfor %}

{% endblock %}
