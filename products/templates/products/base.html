<!DOCTYPE html>
<html>
<head>
    <title>Products System</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f4f6f8;
        }

        .topbar {
            background: #222;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar a {
            color: white;
            margin-left: 10px;
            text-decoration: none;
        }

        .topbar a:hover {
            text-decoration: underline;
        }

        .container {
            padding-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .btn-box {
    display: inline-block;
    padding: 10px 14px;
    background: #4a6fa5;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 500;
}

.btn-box:hover {
    background: #355a86;
    transform: translateY(-1px);
}
    </style>
</head>

<body>

<div class="topbar">
    <div><b>PRODUCTS SYSTEM</b></div>

    <div>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'stall_list' %}">Stalls</a>
        <a href="{% url 'product_list' %}">Products</a>
    </div>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>



</body>
</html>
