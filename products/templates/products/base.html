<!DOCTYPE html>
<html>
<head>
    <title>Products System</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        .topbar {
            background: #222;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar a {
            color: white;
            margin-left: 10px;
            text-decoration: none;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="topbar">
    <div><b>PRODUCTS SYSTEM</b></div>

    <div>
        <a href="/home/">Home</a>
        <a href="/stalls/">Stalls</a>
        <a href="/products/">Products</a>
    </div>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
