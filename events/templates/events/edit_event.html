<!DOCTYPE html>
<html>
<head>
    <title>Edit Event</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #333;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
            border-left: 5px solid #004a99;
            padding-left: 10px;
        }

        form p {
            margin-bottom: 15px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            background: #004a99;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn:hover {
            background: #003b7a;
        }

        .btn-secondary {
            background: #6c757d;
            text-decoration: none;
            display: inline-block;
            padding: 10px 15px;
            border-radius: 6px;
            color: white;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .top-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2>Edit Event</h2>

        <div class="top-info">
            Editing: <strong>{{ event.title }}</strong>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn">
                Save Changes
            </button>

            <a href="{% url 'event_detail' event.id %}" class="btn-secondary">
                Cancel
            </a>
        </form>

    </div>

</div>

</body>
</html>
