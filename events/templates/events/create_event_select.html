<!DOCTYPE html>
<html>
<head>
    <title>Select Event Type</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            width: 360px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #222;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d9d9d9;
            background: #fafafa;
            font-size: 14px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #004a99;
            background: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #004a99;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #003a7a;
        }

        .note {
            font-size: 12px;
            color: #777;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Select Event Type</h2>

    <form method="POST">
        {% csrf_token %}

        <select name="event_type">
            <option value="concert">🎤 Concert</option>
            <option value="tournament">🏆 Tournament</option>
            <option value="bazaar">🛍️ Bazaar</option>
        </select>

        <button type="submit">Continue</button>

        <div class="note">
            Choose the type of event you want to create
        </div>
    </form>

</div>

</body>
</html>
