<!DOCTYPE html>
<html>
<head>
    <title>MMU Stall Hub</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        nav { background: #004a99; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; }
        .btn-signup { background: #28a745; padding: 5px 15px; border-radius: 4px; }
        .content { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>
    <nav>
        <strong>MMU Stall Hub</strong>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <span>Hi, {{ user.first_name }}!</span>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}" class="btn-signup">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    <div class="content">
        <h1>Welcome to the Hub</h1>
        <p>Browse stalls or login to create your own.</p>
    </div>
</body>
</html>
