<!DOCTYPE html>
<html>
<head>
    <title>Sign Up | MMU Stall</title>
    <style>
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            width: 400px; 
        }
        h2 { 
            text-align: center; 
            color: #1c1e21; 
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        
        .helptext, .helptext ul {
            display: none; 
        }

        /* Styling the form inputs */
        p {
            margin-bottom: 15px;
            color: #606770;
            font-size: 14px;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #dddfe2; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        input:focus {
            border-color: #1877f2;
            outline: none;
            box-shadow: 0 0 0 2px #e7f3ff;
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #42b72a; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        button:hover { 
            background-color: #36a420; 
        }

        .footer { 
            margin-top: 20px; 
            text-align: center; 
            font-size: 14px; 
            border-top: 1px solid #dddfe2;
            padding-top: 20px;
        }
        a { 
            color: #1877f2; 
            text-decoration: none; 
            font-weight: 600; 
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create MMU Account</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
        <div class="footer">
            Have an account already? <a href="{% url 'login' %}">Log in here</a>
        </div>
    </div>
</body>
</html>
