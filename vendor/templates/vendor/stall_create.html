{% extends 'vendor/base.html' %}

{% block title %}Create Stall{% endblock %}

{% block content %}

<div class="card" style="max-width:500px; margin:auto; padding:20px;">

    <h2 class="title">Create Stall</h2>

    <!-- 🔥 Show context -->
    <div style="margin-bottom:15px; padding:10px; background:#f3f4f6; border-radius:8px;">
        <strong>Vendor:</strong> {{ vendor.name }} <br>
        <strong>Event:</strong> {{ vendor.event.title }}
    </div>

    <form method="POST">
        {% csrf_token %}

        <!-- NO MORE vendor selection (FIXED) -->
        <!-- Vendor is auto-assigned in backend -->

        <!-- Event Name -->
        <div class="mb-3">
            <label>Event Name</label>
            <input type="text" name="event_name" class="form-control" required>
        </div>

        <!-- Location -->
        <div class="mb-3">
            <label>Location</label>
            <input type="text" name="location" class="form-control" required>
        </div>

        <!-- Capacity -->
        <div class="mb-3">
            <label>Capacity</label>
            <input type="number" name="capacity" class="form-control" value="0">
        </div>

        <!-- Rental Fee -->
        <div class="mb-3">
            <label>Rental Fee</label>
            <input type="number" name="rental_fee" class="form-control" step="0.01" value="0">
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Create Stall
        </button>

    </form>

</div>

{% endblock %}
