{% extends 'vendor/base.html' %}

{% block title %}Create Stall{% endblock %}

{% block content %}

<div class="container">

    <div class="form-card card">

        <h1 class="title">Create Stall</h1>

        <form method="POST">
            {% csrf_token %}

            <!-- Vendor -->
            <label>Vendor</label>
            <select name="vendor">
                {% for v in vendors %}
                    <option value="{{ v.id }}">{{ v.name }}</option>
                {% endfor %}
            </select>

            <!-- Stall Name -->
            <label>Stall Name</label>
            <input type="text" name="stall_name" placeholder="Enter stall name">

            <!-- Location -->
            <label>Location</label>
            <input type="text" name="location" placeholder="Enter location">

            <!-- Event Name -->
            <label>Event Name</label>
            <input type="text" name="event_name" placeholder="Enter event name">

            <!-- Button -->
            <button type="submit" class="btn btn-view full-btn">
                Create Stall
            </button>

        </form>

    </div>

</div>

{% endblock %}
