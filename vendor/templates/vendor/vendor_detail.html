{% extends 'vendor/base.html' %}
{% load static %}

{% block title %}Vendor Detail{% endblock %}

{% block content %}

<div class="detail-container">

    <div class="card detail-card">

        <h1 class="title" style="margin-bottom: 10px;">
            {{ vendor.name }}
        </h1>

        <hr style="border: none; border-top: 1px solid #eee; margin: 15px 0;">

        <p><strong>Phone:</strong> {{ vendor.phone }}</p>
        <p><strong>Social Media:</strong> {{ vendor.social_media }}</p>
        <p><strong>Description:</strong> {{ vendor.description }}</p>

        <div style="margin-top: 20px;">
            <a href="{% url 'vendor_list' %}" class="btn btn-back">
                ← Back to List
            </a>
        </div>

    </div>

</div>

{% endblock %}
