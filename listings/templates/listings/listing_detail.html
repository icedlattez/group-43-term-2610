{% load static %}
<link rel="stylesheet" href="{% static 'listings/style.css' %}">
<a href="{% url 'home' %}" class="btn">Home</a>

<div class="card">

<h2>{{ listing.title }}</h2>
<p>{{ listing.description }}</p>
<h3>RM {{ listing.price }}</h3>

<p>
    Seller:
    {% if listing.user %}
        {{ listing.user.username }}
    {% else %}
        Admin
    {% endif %}
</p>

<a href="{% url 'listing_list' %}" class="btn">Back</a>

{% if user.is_authenticated %}
<form method="POST" action="{% url 'delete_listing' listing.id %}">
    {% csrf_token %}
    <button class="btn">Delete</button>
</form>
{% endif %}

</div>
