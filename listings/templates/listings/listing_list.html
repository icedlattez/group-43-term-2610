<h2>🛍️ Products</h2>

<div class="grid">
{% for item in products %}
<a href="{% url 'listing_detail' item.id %}">
    <div class="card">
        <h3>{{ item.title }}</h3>
        <p>RM {{ item.price }}</p>
        <p>Stock: {{ item.stock }}</p>
    </div>
</a>
{% endfor %}
</div>


<h2>Marketplace</h2>

<div class="grid">
{% for item in personal_listings %}
<a href="{% url 'listing_detail' item.id %}">
    <div class="card">
        <h3>{{ item.title }}</h3>
        <p>RM {{ item.price }}</p>
        <p>Seller: {{ item.user.username }}</p>
    </div>
</a>
{% endfor %}
</div>
